name: Deploy to EC2

on:
  push:
    branches: [ "main", "skill2" ] # skill2 브랜치 추가
  workflow_dispatch:              # 수동 배포 버튼 추가

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            # 1. 프로젝트 폴더로 이동
            cd /home/ubuntu/pet_trainer
            
            # 2. 최신 코드 가져오기 (전체 브랜치 정보 업데이트)
            git fetch origin
            
            # 3. 푸시된 브랜치(${{ github.ref_name }})로 전환 및 업데이트
            echo "Deploying branch: ${{ github.ref_name }}"
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            
            # 4. Docker 서비스 재시작
            sudo docker compose down
            sudo docker compose up -d --build --remove-orphans
            
            # 5. 불용 이미지 정리
            sudo docker image prune -f

            # 6. 상태 확인
            sleep 5
            sudo docker ps